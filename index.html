<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS-ONE - 究極のコミットメント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-animation { animation: shake 0.5s; animation-iteration-count: infinite; }
        .neon-shadow { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="app-container" class="transition-colors duration-100 flex flex-col items-center w-full max-w-md">
        <h1 class="text-3xl font-bold text-yellow-500 mb-8">ZOS-ONE</h1>
        
        <input type="text" id="userInput" placeholder="今の心境を入力..." 
               class="w-full p-4 mb-6 bg-gray-900 border border-yellow-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-yellow-500">

        <button id="commitBtn" 
                class="w-full py-8 text-2xl font-black bg-yellow-600 hover:bg-yellow-500 text-black rounded-lg shadow-lg transition-transform hover:scale-105">
            コミットする
        </button>
    </div>

    <!-- 演出用要素 -->
    <div id="overlay" class="fixed inset-0 flex items-center justify-center hidden pointer-events-none z-50">
        <h2 id="explosionText" class="text-8xl font-black text-white neon-shadow opacity-0 transition-opacity duration-300">
            ゾォォォォス！！！
        </h2>
    </div>

    <script>
        const btn = document.getElementById('commitBtn');
        const input = document.getElementById('userInput');
        const container = document.getElementById('app-container');
        const overlay = document.getElementById('overlay');
        const explosionText = document.getElementById('explosionText');

        // 音声合成とSEの準備
        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        };

        const playSounds = async (isFury) => {
            initAudio();
            
            // 1. 音声合成 (Web Speech API)
            const utterance = new SpeechSynthesisUtterance("ゾォォォォス！！！");
            const voices = window.speechSynthesis.getVoices();
            // 男性っぽい声を探す（環境依存のため、見つからない場合は標準を使用）
            const maleVoice = voices.find(v => v.name.includes('Google') && v.name.includes('Male')) || voices[0];
            utterance.voice = maleVoice;
            utterance.lang = 'ja-JP';
            utterance.pitch = 0.2; // さらに低く
            utterance.rate = 0.7;  // ゆっくりで威圧的
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);

            // 2. SE (爆発音のサンプル)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        };

        btn.addEventListener('click', () => {
            const val = input.value;
            const isFury = ["疲れた", "無理", "明日"].some(word => val.includes(word));
            
            // 演出開始
            container.classList.add('shake-animation');
            document.body.classList.add('bg-red-600');
            overlay.classList.remove('hidden');
            explosionText.classList.remove('opacity-0');
            
            playSounds(isFury);

            // 演出時間
            setTimeout(() => {
                container.classList.remove('shake-animation');
                document.body.classList.remove('bg-red-600');
                overlay.classList.add('hidden');
                explosionText.classList.add('opacity-0');
            }, isFury ? 2000 : 1000);
        });
    </script>
</body>
</html>
