<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS-ONE - 究極のコミットメント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .shake-animation { animation: shake 0.2s infinite; }
        .neon-shadow { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
        .golden-shadow { text-shadow: 0 0 15px #ffd700, 0 0 30px #ffd700; color: #ffd700; }
        .noise { filter: grayscale(100%) contrast(200%); }
        #userInput { z-index: 100; }
    </style>
</head>
<body class="bg-black text-white h-[100dvh] flex flex-col-reverse p-4 overflow-hidden">

    <div id="app-container" class="flex flex-col items-center w-full pb-8">
        <button id="commitBtn" class="w-full py-8 text-6xl font-black bg-yellow-600 text-black rounded-3xl transition-transform active:scale-95 shadow-2xl">ゾス！</button>
        <input type="text" id="userInput" placeholder="今の心境を入力..." class="w-full p-6 my-6 bg-gray-900 border-4 border-yellow-600 rounded-2xl text-2xl text-white focus:outline-none">
        <h1 id="title" class="text-6xl font-black text-yellow-500 mb-auto">ZOS-ONE</h1>
    </div>

    <div id="overlay" class="fixed inset-0 flex items-center justify-center hidden pointer-events-none z-50">
        <h2 id="explosionText" class="text-8xl font-black text-white neon-shadow transition-opacity duration-100">ゾォォォォス！！！</h2>
    </div>

    <script>
        let status = localStorage.getItem('zos_status') || 'normal';
        let clickCount = 0;
        let lastActionTime = Date.now();
        let idleTimer, inputTimer;

        const userInput = document.getElementById('userInput');
        const commitBtn = document.getElementById('commitBtn');

        const triggerLegend = async () => {
            status = 'legend';
            document.body.className = "bg-gradient-to-br from-yellow-900 to-yellow-500 h-[100dvh] flex flex-col-reverse p-4 overflow-hidden";
            document.getElementById('title').textContent = "ZOS-ONE (伝説)";
            document.getElementById('title').className = "text-6xl font-black golden-shadow mb-auto";
            
            const synth = window.speechSynthesis;
            const ut = new SpeechSynthesisUtterance("神々しきゾス！");
            ut.pitch = 1.5;
            synth.speak(ut);

            setTimeout(() => { status = 'normal'; updateUI(); }, 60000);
        };

        const updateUI = () => {
            document.body.className = (status === 'damaged' ? "bg-gray-800 noise" : "bg-black") + " h-[100dvh] flex flex-col-reverse p-4 overflow-hidden text-white";
            document.getElementById('title').textContent = status === 'damaged' ? "ZOS-ONE (喰らってる)" : "ZOS-ONE";
        };

        const triggerFury = async (count = 1) => {
            status = 'angry';
            for(let i=0; i<count; i++) {
                document.body.classList.add('bg-red-600', 'shake-animation');
                document.getElementById('overlay').classList.remove('hidden');
                new SpeechSynthesisUtterance("ゾォォォォス！！！").speak(window.speechSynthesis);
                await new Promise(r => setTimeout(r, 1000));
            }
            document.body.classList.remove('bg-red-600', 'shake-animation');
            document.getElementById('overlay').classList.add('hidden');
            userInput.placeholder = "言い訳を打て！ ゾス！";
            userInput.focus();
            inputTimer = setTimeout(() => triggerFury(1), 5000);
        };

        userInput.addEventListener('input', () => {
            clearTimeout(inputTimer);
            document.body.classList.remove('bg-red-600', 'shake-animation');
            document.getElementById('overlay').classList.add('hidden');
        });

        commitBtn.addEventListener('click', () => {
            clearTimeout(idleTimer);
            const val = userInput.value;
            if (["達成率100%", "目標達成", "完遂"].includes(val)) triggerLegend();
            else if (["無理", "帰りたい"].some(w => val.includes(w))) triggerFury(3);
            else {
                clickCount++;
                if (clickCount >= 100) triggerLegend();
            }
            userInput.value = "";
            userInput.placeholder = "今の心境を入力...";
            updateUI();
            idleTimer = setTimeout(() => triggerFury(1), 15000);
        });

        idleTimer = setTimeout(() => triggerFury(1), 15000);
        updateUI();
    </script>
</body>
</html>
