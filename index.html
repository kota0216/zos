<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS-ONE: 目標達成管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes rainbow { 0%{color:red} 20%{color:orange} 40%{color:yellow} 60%{color:green} 80%{color:blue} 100%{color:violet} }
        .gold-bg { background: linear-gradient(135deg, #FFD700 0%, #FFF8DC 50%, #B8860B 100%); }
        .rainbow-text { animation: rainbow 2s linear infinite; }
        .shake-fast { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="bg-black text-white h-[100dvh] flex flex-col p-6 overflow-hidden">

    <div id="mainUI" class="flex-grow flex flex-col justify-center gap-6">
        <input type="text" id="goal" placeholder="本日の目標を入力" class="w-full p-4 bg-gray-800 text-2xl rounded-xl border border-yellow-600 text-white">
        <div class="text-center">
            <label class="text-xl">達成率: <span id="rateVal">0</span>%</label>
            <input type="range" id="rate" min="0" max="100" value="0" class="w-full h-4">
        </div>
        <button id="submit" class="w-full py-8 text-4xl font-black bg-yellow-600 text-black rounded-3xl shadow-[0_0_50px_rgba(255,215,0,0.5)]">ゾス！と報告</button>
    </div>

    <script>
        let audioCtx;
        const rateSlider = document.getElementById('rate');
        const rateVal = document.getElementById('rateVal');
        
        rateSlider.oninput = () => rateVal.textContent = rateSlider.value;

        const speak = (text, pitch = 0.5, rate = 1.0) => {
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = pitch;
            u.rate = rate;
            window.speechSynthesis.speak(u);
        };

        const playAmazingBGM = () => {
            const audio = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"); // 代替音源（高揚感のあるものに変更可）
            audio.loop = true;
            audio.play();
            return audio;
        };

        document.getElementById('submit').onclick = () => {
            const val = parseInt(rateSlider.value);
            const goal = document.getElementById('goal').value;

            if (val >= 100) {
                document.body.className = "gold-bg h-[100dvh] flex flex-col items-center justify-center";
                document.body.innerHTML = `<h1 class="text-7xl font-black rainbow-text shake-fast">アメージング・ゾス！！！</h1><button onclick="location.reload()" class="mt-10 p-6 bg-black text-white rounded-full">戻る</button>`;
                playAmazingBGM();
                speak("アメージング・ゾス！！！", 1.2, 1.2);
            } else if (val >= 50) {
                speak("まあまあだな。つぎ、いけ！", 0.6, 1.0);
                alert("目標: " + goal + "。まあまあだな。つぎ、いけ！");
            } else {
                document.body.className = "bg-red-600 h-[100dvh] flex flex-col items-center justify-center";
                document.body.innerHTML = `<h1 class="text-7xl font-black shake-fast">ゾォォォォス！！！</h1><button onclick="location.reload()" class="mt-10 p-6 bg-black text-white rounded-full">戻る</button>`;
                speak("ふざけるな！数字がすべてだ！ゾス！！", 0.1, 0.8);
            }
        };
    </script>
</body>
</html>
