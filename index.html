<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOS-ONE - 究極のコミットメント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .shake-animation { animation: shake 0.2s infinite; }
        .neon-shadow { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
        .noise { filter: grayscale(100%) contrast(200%); }
        .scanline { background: linear-gradient(to bottom, rgba(200,200,200,0.1) 50%, rgba(0,0,0,0.1) 50%); background-size: 100% 4px; pointer-events: none; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500">

    <div id="app-container" class="transition-colors duration-100 flex flex-col items-center w-full max-w-md">
        <h1 id="title" class="text-3xl font-bold text-yellow-500 mb-8">ZOS-ONE</h1>
        <input type="text" id="userInput" placeholder="今の心境を入力..." class="w-full p-4 mb-6 bg-gray-900 border border-yellow-600 rounded text-white focus:outline-none">
        <button id="commitBtn" class="w-full py-8 text-2xl font-black bg-yellow-600 text-black rounded-lg transition-transform hover:scale-105">ゾス！</button>
    </div>

    <div id="overlay" class="fixed inset-0 flex items-center justify-center hidden pointer-events-none z-50">
        <h2 id="explosionText" class="text-8xl font-black text-white neon-shadow transition-opacity duration-100">ゾォォォォス！！！</h2>
    </div>

    <script>
        let status = localStorage.getItem('zos_status') || 'normal';
        let clickCount = 0;
        let lastActionTime = Date.now();

        const updateUI = () => {
            const body = document.body;
            const btn = document.getElementById('commitBtn');
            const title = document.getElementById('title');
            
            body.className = "min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500 " + 
                (status === 'damaged' ? "bg-gray-800 noise" : "bg-black");
            btn.className = "w-full text-black font-black rounded-lg transition-transform hover:scale-105 " + 
                (status === 'damaged' ? "py-2 text-sm bg-gray-600" : "py-8 text-2xl bg-yellow-600");
            title.textContent = status === 'damaged' ? "ZOS-ONE (喰らってる)" : "ZOS-ONE";
        };

        const playSounds = (type) => {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(type === 'damaged' ? "……ゾス" : "ゾォォォォス！！！");
            utterance.pitch = type === 'damaged' ? 0.1 : 0.6;
            utterance.rate = type === 'damaged' ? 0.4 : 1.2;
            synth.speak(utterance);
        };

        const triggerFury = async (count = 1) => {
            status = 'angry';
            for(let i=0; i<count; i++) {
                document.body.classList.add('bg-red-600', 'shake-animation');
                document.getElementById('overlay').classList.remove('hidden');
                playSounds('angry');
                await new Promise(r => setTimeout(r, 1000));
                document.body.classList.remove('bg-red-600', 'shake-animation');
                document.getElementById('overlay').classList.add('hidden');
            }
            status = 'normal';
            localStorage.setItem('zos_status', status);
            updateUI();
        };

        document.getElementById('commitBtn').addEventListener('click', () => {
            lastActionTime = Date.now();
            const val = document.getElementById('userInput').value;
            if (["無理", "帰りたい", "明日やる", "疲れた"].some(w => val.includes(w))) {
                triggerFury(3);
            } else if (["絶好調", "やります", "達成"].some(w => val.includes(w))) {
                status = 'normal';
            } else {
                clickCount++;
                if (clickCount >= 10) { status = 'normal'; clickCount = 0; }
            }
            localStorage.setItem('zos_status', status);
            updateUI();
        });

        setInterval(() => {
            if (Date.now() - lastActionTime > 15000 && status === 'normal') {
                alert("サボるな！数字はどうした！");
                triggerFury(1);
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
